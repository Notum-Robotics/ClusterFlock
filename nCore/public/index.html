<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <title>ClusterFlock — nCore</title>
    <link rel="stylesheet" href="notum_AHI/css/phosphor.css?v=20260228">
    <link rel="stylesheet" href="notum_AHI/css/style.css?v=20260228">
    <link rel="stylesheet" href="notum_AHI/css/notum.css?v=20260228">
    <style>
        html, body { overflow: hidden; }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            max-width: 100%;
        }

        /* ── Header ───────────────────────────────── */
        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px 10px;
            flex-shrink: 0;
            border-bottom: 1px solid var(--border);
        }
        .dash-header h1 {
            font-family: var(--font-label);
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: rgba(244,244,244, 0.45);
        }
        .dash-header h1 span { font-weight: 400; color: rgba(244,244,244, 0.25); }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .conn { position: static; }

        /* ── Nav tabs ─────────────────────────────── */
        .nav-tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .nav-tab {
            flex: 1;
            text-align: center;
            font-family: var(--font-data);
            font-size: .65rem;
            letter-spacing: .12em;
            text-transform: uppercase;
            padding: 8px 12px;
            color: var(--text-dim);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: color .15s, border-color .15s;
            text-decoration: none;
        }
        .nav-tab:hover { color: var(--text); }
        .nav-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* ── Main scrollable body ─────────────────── */
        .dash-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .dash-body::-webkit-scrollbar { display: none; }

        /* ── Node card — expandable ───────────────── */
        .node-card {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: border-color .2s;
        }
        .node-card.healthy { border-color: rgba(0,229,255, 0.25); }
        .node-card.stale   { border-color: rgba(255,179,0, 0.15); }
        .node-card.dead    { border-color: rgba(255,51,51, 0.12); }

        .node-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .node-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 1rem;
            color: var(--text-dim);
            flex-shrink: 0;
        }
        .node-card.healthy .node-icon { background: var(--accent); border-color: rgba(0,229,255, 0.3); color: var(--bg); }
        .node-card.stale .node-icon   { background: var(--amber); border-color: rgba(255,179,0, 0.3); color: var(--bg); }
        .node-card.dead .node-icon    { background: var(--danger); border-color: rgba(255,51,51, 0.25); color: var(--bg); }

        .node-summary { flex: 1; min-width: 0; }
        .node-summary .hostname {
            font-size: .9rem;
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .node-summary .meta {
            font-family: var(--font-data);
            font-size: .55rem;
            color: var(--text-dim);
            letter-spacing: .05em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .node-badges { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
        .badge {
            font-family: var(--font-data);
            font-size: .55rem;
            font-weight: 500;
            letter-spacing: .08em;
            padding: 2px 6px;
            border-radius: var(--radius);
            text-transform: uppercase;
        }
        .badge-status { border: 1px solid; }
        .node-card.healthy .badge-status { color: var(--accent); border-color: rgba(0,229,255, 0.25); }
        .node-card.stale .badge-status   { color: var(--amber); border-color: rgba(255,179,0, 0.25); }
        .node-card.dead .badge-status    { color: var(--danger); border-color: rgba(255,51,51, 0.2); }
        .badge-models { color: var(--accent); border: 1px solid rgba(0,229,255, 0.15); }
        .badge-models.none { color: var(--text-dim); border-color: var(--border); }
        .badge-version { color: var(--text-dim); border: 1px solid var(--border); }
        .badge-version.outdated { color: var(--amber); border-color: rgba(255,179,0, 0.3); }

        .expand-chevron {
            font-size: .7rem;
            color: var(--text-dim);
            transition: transform .2s;
            flex-shrink: 0;
        }
        .node-card.open .expand-chevron { transform: rotate(180deg); }

        /* Expandable detail */
        .node-detail {
            max-height: 0;
            overflow: hidden;
            transition: max-height .25s ease;
        }
        .node-card.open .node-detail { max-height: 600px; }
        .node-detail-inner {
            padding: 0 12px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-top: 1px solid var(--border);
        }

        /* GPU chips */
        .gpu-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 8px;
            background: rgba(0,229,255, 0.03);
            border: 1px solid rgba(0,229,255, 0.08);
            border-radius: var(--radius);
        }
        .gpu-chip .gpu-name {
            font-family: var(--font-data);
            font-size: .6rem;
            color: var(--accent);
            flex: 1; min-width: 0;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .gpu-chip .gpu-vram {
            font-family: var(--font-data);
            font-size: .55rem;
            color: var(--text-dim);
            flex-shrink: 0;
        }

        /* Metric bars (AHI seg-bar) */
        .metric-row { display: flex; align-items: center; gap: 8px; }
        .metric-label {
            font-family: var(--font-data);
            font-size: .5rem;
            letter-spacing: .1em;
            color: var(--text-dim);
            text-transform: uppercase;
            width: 42px; text-align: right; flex-shrink: 0;
        }
        .metric-seg-bar {
            flex: 1; display: flex; gap: 1px; height: 5px;
        }
        .metric-seg-bar .seg {
            flex: 1; height: 100%;
            background: rgba(244,244,244, 0.06); border-radius: 1px;
        }
        .metric-seg-bar .seg.filled { background: var(--accent); }
        .metric-seg-bar .seg.filled.warn { background: var(--amber); }
        .metric-seg-bar .seg.filled.crit { background: var(--danger); }
        .metric-pct {
            font-family: var(--font-data);
            font-size: .55rem;
            color: var(--text);
            width: 32px; text-align: right; flex-shrink: 0;
        }

        /* Hw grid */
        .hw-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 6px;
        }
        .hw-item {
            background: rgba(244,244,244, 0.02);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 6px 8px;
            display: flex; flex-direction: column; gap: 2px;
        }
        .hw-item .hw-label {
            font-family: var(--font-data);
            font-size: .5rem; letter-spacing: .12em;
            color: var(--text-dim); text-transform: uppercase;
        }
        .hw-item .hw-value {
            font-family: var(--font-data);
            font-size: .75rem; font-weight: 500; color: var(--text);
        }

        /* Endpoint tags */
        .endpoint-tag {
            display: inline-block;
            font-family: var(--font-data);
            font-size: .55rem;
            padding: 2px 6px;
            border: 1px solid rgba(0,229,255, 0.2);
            border-radius: var(--radius);
            color: var(--accent);
            margin: 2px 4px 2px 0;
        }
        .endpoint-tag.loading { border-color: rgba(255,179,0, 0.2); color: var(--amber); }
        .endpoint-tag.error   { border-color: rgba(255,51,51, 0.2); color: var(--danger); }

        .detail-label {
            font-family: var(--font-data);
            font-size: .5rem;
            letter-spacing: .12em;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* ── Section label ────────────────────────── */
        .section-label {
            font-family: var(--font-data);
            font-size: .6rem;
            letter-spacing: .15em;
            color: var(--text-dim);
            text-transform: uppercase;
            padding: 4px 4px 0;
        }

        /* ── Action bar ───────────────────────────── */
        .action-bar {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
        }
        .act-btn {
            font-family: var(--font-label);
            font-size: .7rem;
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-dim);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: border-color .15s, color .15s;
        }
        .act-btn:hover { border-color: rgba(0,229,255, 0.3); color: var(--accent); }
        .act-btn.primary {
            border-color: rgba(0,229,255, 0.3);
            color: var(--accent);
            background: rgba(0,229,255, 0.06);
        }
        .act-btn.primary:hover { background: rgba(0,229,255, 0.12); }
        .act-btn.green {
            border-color: rgba(0,200,83, 0.3);
            color: #00c853;
            background: rgba(0,200,83, 0.06);
        }
        .act-btn.green:hover { background: rgba(0,200,83, 0.12); }
        .act-btn.active {
            border-color: rgba(0,229,255, 0.5);
            color: var(--accent);
            background: rgba(0,229,255, 0.10);
        }
        .act-btn.disabled { opacity: 0.4; pointer-events: none; }

        /* ── Prompt input ─────────────────────────── */
        .prompt-area {
            flex-shrink: 0;
            padding: 10px 12px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }
        .prompt-input {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: var(--font-data);
            font-size: .8rem;
            padding: 10px 12px;
            resize: none;
            min-height: 42px;
            max-height: 120px;
            line-height: 1.4;
            outline: none;
        }
        .prompt-input::placeholder { color: var(--text-dim); }
        .prompt-input:focus { border-color: rgba(0,229,255, 0.3); }
        .send-btn {
            width: 42px; height: 42px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(0,229,255, 0.3);
            border-radius: var(--radius);
            color: var(--accent);
            cursor: pointer;
            flex-shrink: 0;
            font-size: 1.1rem;
            background: rgba(0,229,255, 0.06);
            transition: background .15s;
        }
        .send-btn:hover { background: rgba(0,229,255, 0.15); }
        .send-btn.disabled { opacity: 0.3; pointer-events: none; }

        /* ── Response output area ─────────────────── */
        .responses-area { display: flex; flex-direction: column; gap: 8px; }

        .response-card {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        .response-card.streaming { border-color: rgba(0,229,255, 0.2); }
        .response-card.done      { border-color: rgba(0,229,255, 0.12); }
        .response-card.error     { border-color: rgba(255,51,51, 0.2); }
        .response-card.timeout   { border-color: rgba(255,179,0, 0.2); }

        .response-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }
        .response-model {
            font-family: var(--font-data);
            font-size: .6rem;
            color: var(--accent);
            letter-spacing: .05em;
            flex: 1; min-width: 0;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .response-host {
            font-family: var(--font-data);
            font-size: .5rem;
            color: var(--text-dim);
            flex-shrink: 0;
        }
        .response-status {
            font-family: var(--font-data);
            font-size: .5rem;
            letter-spacing: .1em;
            text-transform: uppercase;
            flex-shrink: 0;
        }
        .response-card.streaming .response-status { color: var(--accent); }
        .response-card.done .response-status      { color: var(--text-dim); }
        .response-card.error .response-status      { color: var(--danger); }
        .response-card.timeout .response-status    { color: var(--amber); }

        .response-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height .25s ease;
        }
        .response-card.open .response-body { max-height: 2000px; }
        .response-body-inner {
            padding: 10px 12px;
            font-family: var(--font-data);
            font-size: .7rem;
            color: var(--text);
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            user-select: text;
            -webkit-user-select: text;
        }
        .response-meta {
            font-family: var(--font-data);
            font-size: .5rem;
            color: var(--text-dim);
            padding: 4px 12px 8px;
        }

        .expand-r-chevron {
            font-size: .6rem;
            color: var(--text-dim);
            transition: transform .2s;
            flex-shrink: 0;
        }
        .response-card.open .expand-r-chevron { transform: rotate(180deg); }

        /* Streaming cursor blink */
        .stream-cursor::after {
            content: '\25CC';
            animation: blink-cursor .6s steps(1) infinite;
            color: var(--accent);
        }
        @keyframes blink-cursor {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0; }
        }

        /* ── Empty state ──────────────────────────── */
        .empty-state {
            flex: 1;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 12px; color: var(--text-dim);
        }
        .empty-state i { font-size: 3rem; opacity: 0.3; }
        .empty-state .msg {
            font-family: var(--font-data);
            font-size: .7rem;
            letter-spacing: .1em;
            text-transform: uppercase;
        }

        /* ── Footer ───────────────────────────────── */
        .dash-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 16px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .footer-info {
            font-family: var(--font-data);
            font-size: .55rem;
            color: var(--text-dim);
            letter-spacing: .08em;
        }
        .footer-info .accent { color: var(--accent); }

        /* ── Pending card ─────────────────────────── */
        .pending-card {
            position: relative;
            background: var(--surface);
            border: 1px solid rgba(255,179,0, 0.2);
            border-radius: var(--radius);
            padding: 10px 12px;
            display: flex; align-items: center; gap: 10px;
            overflow: hidden;
        }
        .pending-card .corner { color: rgba(255,179,0, 0.2); }
        .pending-icon {
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,179,0, 0.25);
            border-radius: var(--radius);
            color: var(--amber); font-size: .85rem; flex-shrink: 0;
            animation: hardBlink 1s steps(1) infinite;
        }
        .pending-info { flex: 1; min-width: 0; }
        .pending-info .p-host {
            font-size: .8rem; font-weight: 600;
            letter-spacing: .08em; text-transform: uppercase;
            color: var(--amber);
        }
        .pending-info .p-meta { font-family: var(--font-data); font-size: .5rem; color: var(--text-dim); }
        .pending-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .p-btn {
            font-family: var(--font-label);
            font-size: .6rem; font-weight: 600;
            letter-spacing: .06em; text-transform: uppercase;
            padding: 4px 8px; border-radius: var(--radius);
            cursor: pointer; border: 1px solid;
        }
        .p-btn.approve { color: var(--accent); border-color: rgba(0,229,255, 0.3); background: rgba(0,229,255, 0.06); }
        .p-btn.reject  { color: var(--danger); border-color: rgba(255,51,51, 0.25); background: rgba(255,51,51, 0.06); }

        /* ── Prompt echo ──────────────────────────── */
        .prompt-echo {
            background: rgba(0,229,255, 0.03);
            border: 1px solid rgba(0,229,255, 0.1);
            border-radius: var(--radius);
            padding: 8px 12px;
            font-family: var(--font-data);
            font-size: .65rem;
            color: var(--text-dim);
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .prompt-echo .label {
            font-size: .5rem;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--accent);
            display: block;
            margin-bottom: 4px;
        }

        /* ── Model selector dropdown ──────────────── */
        .gpu-model-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
        }
        .gpu-model-select {
            flex: 1;
            font-family: var(--font-data);
            font-size: .6rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            padding: 4px 6px;
            outline: none;
            cursor: pointer;
        }
        .gpu-model-select:focus { border-color: rgba(0,229,255, 0.3); }
        .gpu-model-select option { background: var(--bg); color: var(--text); }

        .model-loading-indicator {
            font-family: var(--font-data);
            font-size: .5rem;
            color: var(--amber);
            letter-spacing: .08em;
        }

        /* Activity badge */
        .badge-activity {
            color: var(--amber);
            border: 1px solid rgba(255,179,0, 0.3);
            background: rgba(255,179,0, 0.06);
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .badge-activity i { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Activity detail row */
        .activity-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            background: rgba(255,179,0, 0.04);
            border: 1px solid rgba(255,179,0, 0.15);
            border-radius: var(--radius);
        }
        .activity-icon {
            color: var(--amber);
            font-size: .7rem;
            flex-shrink: 0;
            animation: spin 1s linear infinite;
        }
        .activity-text {
            font-family: var(--font-data);
            font-size: .55rem;
            color: var(--amber);
            letter-spacing: .06em;
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .activity-pct {
            font-family: var(--font-data);
            font-size: .55rem;
            color: var(--amber);
            flex-shrink: 0;
            font-weight: 600;
        }
        .dl-progress-bar {
            height: 3px;
            background: rgba(255,179,0, 0.12);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 2px;
        }
        .dl-progress-fill {
            height: 100%;
            background: var(--amber);
            border-radius: 2px;
            transition: width .5s ease;
        }
        .gpu-model-select optgroup { font-style: normal; font-size: .55rem; color: var(--text-dim); }
        .gpu-model-select option.dl { color: var(--accent); }
        .model-load-error {
            font-family: var(--font-data);
            font-size: .45rem;
            color: var(--danger);
            letter-spacing: .08em;
            margin-top: 2px;
        }

        /* ── Lock button ──────────────────────────── */
        .lock-btn {
            font-family: var(--font-label);
            font-size: .7rem;
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-dim);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: border-color .15s, color .15s;
            margin-left: auto;
        }
        .lock-btn:hover { border-color: rgba(0,229,255, 0.3); color: var(--accent); }
        .lock-btn.locked {
            border-color: rgba(255,179,0, 0.4);
            color: var(--amber);
            background: rgba(255,179,0, 0.06);
        }

        .gpu-model-select:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            border-color: var(--border);
        }
        .cfg-btn {
            font-family: var(--font-label);
            font-size: .7rem;
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-dim);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: border-color .15s, color .15s;
        }
        .cfg-btn:hover { border-color: rgba(0,229,255, 0.3); color: var(--accent); }
        .cfg-btn.active {
            border-color: rgba(0,229,255, 0.4);
            color: var(--accent);
            background: rgba(0,229,255, 0.06);
        }

        /* ── Autoload panel ───────────────────────── */
        .autoload-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background-color: rgba(0,0,0, 0.55);
            background-image:
                url("data:image/svg+xml,%3Csvg width='4' height='4' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='0' y='0' width='2' height='2' fill='%23000' fill-opacity='0.45'/%3E%3Crect x='2' y='2' width='2' height='2' fill='%23000' fill-opacity='0.45'/%3E%3C/svg%3E");
            background-size: 4px 4px;
            image-rendering: pixelated;
        }
        .autoload-overlay.open { display: flex; align-items: center; justify-content: center; }

        .autoload-panel {
            width: 94%; max-width: 520px; max-height: 85vh;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            display: flex; flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .autoload-header {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .autoload-header .al-icon {
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(0,229,255, 0.25);
            border-radius: var(--radius);
            color: var(--accent); font-size: 1rem;
        }
        .autoload-header .al-title {
            font-family: var(--font-label);
            font-size: 1rem; font-weight: 700;
            letter-spacing: .1em; text-transform: uppercase;
            color: var(--text); flex: 1;
        }
        .autoload-header .al-close {
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--border); border-radius: var(--radius);
            color: var(--text-dim); cursor: pointer; font-size: .8rem;
        }
        .autoload-header .al-close:hover { border-color: rgba(255,51,51, 0.3); color: var(--danger); }

        /* Segmented progress bar inside autoload */
        .al-progress-wrap {
            padding: 10px 14px 6px;
            flex-shrink: 0;
        }
        .al-progress-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 6px;
        }
        .al-progress-label {
            font-family: var(--font-data); font-size: .55rem;
            letter-spacing: .1em; text-transform: uppercase;
            color: var(--text-dim);
        }
        .al-progress-pct {
            font-family: var(--font-data); font-size: .65rem;
            font-weight: 500; color: var(--accent);
            letter-spacing: .05em;
        }
        .al-seg-bar {
            display: flex; gap: 2px; height: 8px;
        }
        .al-seg-bar .seg {
            flex: 1; height: 100%;
            background: rgba(244,244,244, 0.06); border-radius: 1px;
            transition: background .15s, filter .15s;
        }
        .al-seg-bar .seg.filled { background: var(--accent); }
        .al-seg-bar .seg.filled.seg-bright { filter: brightness(1.35); }
        .al-seg-bar .seg.filled.seg-dim { filter: brightness(0.7); transition: none; }
        .al-seg-bar .seg.pending { background: rgba(0,229,255, 0.15); }

        .al-summary {
            padding: 0 14px 8px;
            font-family: var(--font-data); font-size: .55rem;
            color: var(--text-dim); letter-spacing: .06em;
        }
        .al-summary .accent { color: var(--accent); }

        /* Step log area */
        .al-steps {
            flex: 1; overflow-y: auto;
            padding: 0 14px 10px;
            display: flex; flex-direction: column; gap: 4px;
        }
        .al-steps::-webkit-scrollbar { display: none; }

        .al-step {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 8px;
            background: rgba(244,244,244, 0.02);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-family: var(--font-data); font-size: .55rem;
            color: var(--text-dim);
        }
        .al-step.done { border-color: rgba(0,229,255, 0.15); }
        .al-step.active { border-color: rgba(0,229,255, 0.3); color: var(--text); }
        .al-step.queued { opacity: 0.5; }

        .al-step-icon {
            width: 20px; height: 20px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--border); border-radius: var(--radius);
            font-size: .6rem; color: var(--text-dim);
        }
        .al-step.done .al-step-icon { background: var(--accent); border-color: rgba(0,229,255, 0.3); color: var(--bg); }
        .al-step.active .al-step-icon { background: rgba(0,229,255, 0.15); border-color: rgba(0,229,255, 0.3); color: var(--accent); }

        .al-step-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
        .al-step-model {
            font-weight: 500; color: var(--text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .al-step.queued .al-step-model { color: var(--text-dim); }
        .al-step-meta {
            font-size: .5rem; color: var(--text-dim);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .al-step-status {
            flex-shrink: 0; font-size: .5rem;
            letter-spacing: .08em; text-transform: uppercase;
        }
        .al-step.done .al-step-status { color: var(--accent); }
        .al-step.active .al-step-status { color: var(--amber); }
        .al-step.queued .al-step-status { color: var(--text-dim); }

        .al-actions {
            display: flex; gap: 8px;
            padding: 10px 14px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .al-actions .act-btn { flex: 1; justify-content: center; }

        /* Mode toggle (AHI toggle-group) */
        .al-mode-toggle {
            display: flex;
            padding: 8px 14px 4px;
            flex-shrink: 0;
        }
        .al-mode-toggle .toggle-group {
            flex: 1;
        }

        /* Manual model checklist */
        .al-manual-list {
            flex: 1; overflow-y: auto;
            padding: 0 14px 6px;
            display: flex; flex-direction: column; gap: 3px;
        }
        .al-manual-list::-webkit-scrollbar { display: none; }
        .al-mitem {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 8px;
            background: rgba(244,244,244, 0.02);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            transition: border-color .15s, background .15s;
        }
        .al-mitem:hover { border-color: rgba(0,229,255, 0.2); background: rgba(0,229,255, 0.03); }
        .al-mitem.selected { border-color: rgba(0,229,255, 0.35); background: rgba(0,229,255, 0.06); }
        .al-mitem-check {
            width: 18px; height: 18px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--border); border-radius: 3px;
            font-size: .6rem; color: transparent;
            transition: border-color .15s, color .15s, background .15s;
        }
        .al-mitem.selected .al-mitem-check {
            border-color: var(--accent); color: var(--accent);
            background: rgba(0,229,255, 0.1);
        }
        .al-mitem-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
        .al-mitem-name {
            font-family: var(--font-data); font-size: .55rem; font-weight: 500;
            color: var(--text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .al-mitem-meta {
            font-family: var(--font-data); font-size: .45rem;
            color: var(--text-dim);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .al-mitem-size {
            flex-shrink: 0;
            font-family: var(--font-data); font-size: .5rem;
            color: var(--text-dim); letter-spacing: .05em;
        }
    </style>
</head>
